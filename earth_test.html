<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Earth Intro Test</title>
<style>
  * { margin:0; padding:0; }
  body { background:#000; overflow:hidden; height:100vh; }
  canvas { display:block; }
  #info { position:fixed; top:10px; left:10px; color:#8f8; font-family:monospace; font-size:11px; z-index:10; }
</style>
</head>
<body>
<div id="info">loading...</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const info = document.getElementById('info');
const TEX_BASE = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/textures/planets/';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

function makeStars(count, radius){
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r = radius * (0.8 + Math.random()*0.4);
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    positions[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    positions[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    positions[i*3+2] = r*Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  const mat = new THREE.PointsMaterial({ color:0xffffff, size:0.7, sizeAttenuation:true, transparent:true, opacity:0.8 });
  return new THREE.Points(geo, mat);
}
const stars = makeStars(3500, 400);
scene.add(stars);

const sun = new THREE.DirectionalLight(0xffffff, 3.2);
sun.position.set(5, 2, 5);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x223344, 0.4));

const loader = new THREE.TextureLoader();
loader.crossOrigin = 'anonymous';
let loaded = 0;
const totalTex = 4;
function onTexLoaded(){ loaded++; info.textContent = `loading textures ${loaded}/${totalTex}`; if(loaded===totalTex) info.textContent='ready'; }

const dayMap = loader.load(TEX_BASE+'earth_atmos_2048.jpg', onTexLoaded);
const normalMap = loader.load(TEX_BASE+'earth_normal_2048.jpg', onTexLoaded);
const specMap = loader.load(TEX_BASE+'earth_specular_2048.jpg', onTexLoaded);
const cloudMap = loader.load(TEX_BASE+'earth_clouds_1024.png', onTexLoaded);
dayMap.colorSpace = THREE.SRGBColorSpace;

const EARTH_R = 2;
const earthGeo = new THREE.SphereGeometry(EARTH_R, 96, 96);
const earthMat = new THREE.MeshPhongMaterial({
  map: dayMap,
  normalMap: normalMap,
  normalScale: new THREE.Vector2(0.85, 0.85),
  specularMap: specMap,
  specular: new THREE.Color(0x333333),
  shininess: 12,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

const cloudGeo = new THREE.SphereGeometry(EARTH_R*1.012, 96, 96);
const cloudMat = new THREE.MeshPhongMaterial({
  map: cloudMap,
  transparent: true,
  opacity: 0.55,
  depthWrite: false,
});
const clouds = new THREE.Mesh(cloudGeo, cloudMat);
scene.add(clouds);

const atmosGeo = new THREE.SphereGeometry(EARTH_R*1.045, 96, 96);
const atmosMat = new THREE.ShaderMaterial({
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vPos;
    void main(){
      vNormal = normalize(normalMatrix * normal);
      vec4 mvPos = modelViewMatrix * vec4(position,1.0);
      vPos = -mvPos.xyz;
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    varying vec3 vPos;
    void main(){
      float intensity = pow(0.68 - dot(vNormal, normalize(vPos)), 3.2);
      vec3 glowColor = vec3(0.35, 0.62, 1.0);
      gl_FragColor = vec4(glowColor, 1.0) * intensity;
    }
  `,
  side: THREE.BackSide,
  blending: THREE.AdditiveBlending,
  transparent: true,
});
const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
scene.add(atmosphere);

let mouseX = 0, mouseY = 0;
let targetRotX = 0, targetRotY = 0;
window.addEventListener('mousemove', (e)=>{
  mouseX = (e.clientX/innerWidth - 0.5) * 2;
  mouseY = (e.clientY/innerHeight - 0.5) * 2;
});

const IDLE_ROT_SPEED = (Math.PI*2) / 75;

const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  earth.rotation.y += IDLE_ROT_SPEED * dt;
  clouds.rotation.y += IDLE_ROT_SPEED * dt * 1.15;

  targetRotX += (mouseY*0.15 - targetRotX) * 0.03;
  targetRotY += (mouseX*0.15 - targetRotY) * 0.03;
  camera.position.x = Math.sin(targetRotY) * 6;
  camera.position.y = targetRotX * 2;
  camera.position.z = Math.cos(targetRotY) * 6;
  camera.lookAt(0,0,0);

  stars.rotation.y += 0.0003 * dt * 60;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
