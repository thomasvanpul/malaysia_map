<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Earth Intro Test v2 - Flight + Crossfade</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#04070c; overflow:hidden; height:100vh; width:100vw; }
  #three-canvas { position:fixed; inset:0; z-index:10; transition:opacity 1.4s cubic-bezier(.4,0,.2,1); }
  #map { position:fixed; inset:0; z-index:5; opacity:0; }
  #wash {
    position:fixed; inset:0; z-index:8; pointer-events:none;
    background: radial-gradient(ellipse at center, rgba(247,245,240,0.9) 0%, rgba(247,245,240,0.55) 45%, rgba(247,245,240,0) 75%);
    opacity:0;
  }
  #info { position:fixed; top:10px; left:10px; color:#8f8; font-family:monospace; font-size:11px; z-index:100; }

  #explore-wrap {
    position:fixed; bottom:64px; left:50%; transform:translateX(-50%);
    z-index:50; text-align:center;
    transition:opacity 0.8s ease;
    cursor:pointer;
  }
  #scroll-hint {
    font-family:-apple-system,'Helvetica Neue',sans-serif; font-size:12px;
    color:rgba(255,255,255,0.55); letter-spacing:0.15em; text-transform:uppercase;
    font-weight:500;
    animation: breathe 3.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.35; transform: translateY(0); }
    50% { opacity: 0.85; transform: translateY(-3px); }
  }
  #title-wrap {
    position:fixed; top:14%; left:50%; transform:translateX(-50%);
    text-align:center; z-index:50; pointer-events:none;
    transition:opacity 0.8s ease;
  }
  #title-wrap h1 {
    font-family:-apple-system,'Helvetica Neue',sans-serif;
    font-size:42px; font-weight:700; color:#fff; letter-spacing:-0.02em;
    text-shadow:0 4px 30px rgba(0,0,0,0.5);
  }
  #title-wrap p {
    margin-top:10px; font-family:-apple-system,sans-serif; font-size:15px;
    color:rgba(255,255,255,0.55); font-weight:400;
  }
</style>
</head>
<body>
<div id="info">loading...</div>
<div id="error-log" style="position:fixed;top:30px;left:10px;color:#f66;font-family:monospace;font-size:11px;z-index:200;white-space:pre-wrap;max-width:90vw;"></div>
<script>
window.addEventListener('error', function(e){
  document.getElementById('error-log').textContent += 'ERROR: ' + e.message + ' @ line ' + e.lineno + '\n';
});
</script>
<div id="title-wrap">
  <h1>West Malaysia District Explorer</h1>
  <p>Property intelligence, reimagined.</p>
</div>
<canvas id="three-canvas"></canvas>
<div id="map"></div>
<div id="wash"></div>
<div id="explore-wrap">
  <div id="scroll-hint">Scroll to continue</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const info = document.getElementById('info');
const TEX_BASE = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/textures/planets/';
const canvasEl = document.getElementById('three-canvas');

const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

function makeStars(count, radius){
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r = radius * (0.8 + Math.random()*0.4);
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    positions[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    positions[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    positions[i*3+2] = r*Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  const mat = new THREE.PointsMaterial({ color:0xffffff, size:0.7, sizeAttenuation:true, transparent:true, opacity:0.8 });
  return new THREE.Points(geo, mat);
}
const stars = makeStars(3500, 400);
scene.add(stars);

const sun = new THREE.DirectionalLight(0xffffff, 3.2);
sun.position.set(5, 2, 5);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x223344, 0.4));

const loader = new THREE.TextureLoader();
loader.crossOrigin = 'anonymous';
let loaded = 0;
const totalTex = 4;
function onTexLoaded(){ loaded++; info.textContent = `loading ${loaded}/${totalTex}`; if(loaded===totalTex){ info.textContent='ready'; onAllLoaded(); } }

const dayMap = loader.load(TEX_BASE+'earth_atmos_2048.jpg', onTexLoaded);
const normalMap = loader.load(TEX_BASE+'earth_normal_2048.jpg', onTexLoaded);
const specMap = loader.load(TEX_BASE+'earth_specular_2048.jpg', onTexLoaded);
const cloudMap = loader.load(TEX_BASE+'earth_clouds_1024.png', onTexLoaded);
dayMap.colorSpace = THREE.SRGBColorSpace;

const EARTH_R = 2;
const earthGeo = new THREE.SphereGeometry(EARTH_R, 96, 96);
const earthMat = new THREE.MeshPhongMaterial({
  map: dayMap, normalMap: normalMap, normalScale: new THREE.Vector2(0.85,0.85),
  specularMap: specMap, specular: new THREE.Color(0x333333), shininess: 12,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

const cloudGeo = new THREE.SphereGeometry(EARTH_R*1.012, 96, 96);
const cloudMat = new THREE.MeshPhongMaterial({ map: cloudMap, transparent:true, opacity:0.55, depthWrite:false });
const clouds = new THREE.Mesh(cloudGeo, cloudMat);
scene.add(clouds);

const atmosGeo = new THREE.SphereGeometry(EARTH_R*1.045, 96, 96);
const atmosMat = new THREE.ShaderMaterial({
  vertexShader: `varying vec3 vNormal; varying vec3 vPos;
    void main(){ vNormal=normalize(normalMatrix*normal); vec4 mv=modelViewMatrix*vec4(position,1.0); vPos=-mv.xyz; gl_Position=projectionMatrix*mv; }`,
  fragmentShader: `varying vec3 vNormal; varying vec3 vPos;
    void main(){ float i=pow(0.68-dot(vNormal,normalize(vPos)),3.2); vec3 c=vec3(0.35,0.62,1.0); gl_FragColor=vec4(c,1.0)*i; }`,
  side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent:true,
});
const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
scene.add(atmosphere);

function latLonToVector3(lat, lon, radius=1){
  const phi = (90 - lat) * (Math.PI/180);
  const theta = (lon + 180) * (Math.PI/180);
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
     radius * Math.cos(phi),
     radius * Math.sin(phi) * Math.sin(theta)
  );
}
const MALAYSIA_LAT = 4.05, MALAYSIA_LON = 101.95;
const targetVec = latLonToVector3(MALAYSIA_LAT, MALAYSIA_LON, 1).normalize();
const faceCamera = new THREE.Vector3(0,0,1);
const targetQuat = new THREE.Quaternion().setFromUnitVectors(targetVec, faceCamera);

let mouseX=0, mouseY=0, targetRotX=0, targetRotY=0;
let parallaxEnabled = true;
window.addEventListener('mousemove', (e)=>{
  if(!parallaxEnabled) return;
  mouseX = (e.clientX/innerWidth - 0.5) * 2;
  mouseY = (e.clientY/innerHeight - 0.5) * 2;
});

const IDLE_ROT_SPEED = (Math.PI*2) / 75;

let flightActive = false;
let flightT = 0;
let flightStartQuat = new THREE.Quaternion();
const FLIGHT_DURATION = prefersReducedMotion ? 1.2 : 4.6;
const START_CAM_Z = 6;
const END_CAM_Z = 2.15;

function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function easeInCubic(t){ return t*t*t; }

function startFlight(){
  if(flightActive) return;
  flightActive = true;
  flightT = 0;
  flightStartQuat.copy(earth.quaternion);
  parallaxEnabled = false;
  document.getElementById('explore-wrap').style.opacity = '0';
  document.getElementById('title-wrap').style.opacity = '0';
  initMap();
}

let mapInited = false;
let leafletMap = null;
function initMap(){
  if(mapInited) return;
  mapInited = true;
  leafletMap = L.map('map', { zoomControl:false, attributionControl:false, dragging:false, scrollWheelZoom:false });
  L.tileLayer('https://api.maptiler.com/maps/dataviz-light/{z}/{x}/{y}.png?key=r1vaJcTInBX0Pvp3CevE', { maxZoom:19 }).addTo(leafletMap);
  leafletMap.setView([MALAYSIA_LAT, MALAYSIA_LON], 7);
}

document.getElementById('explore-wrap').addEventListener('click', startFlight);
// Touch support: swipe/scroll on mobile triggers flight too
window.addEventListener('touchmove', ()=>{
  if(scrollConsumed) return;
  scrollConsumed = true;
  startFlight();
}, { passive:true });
let scrollConsumed = false;
window.addEventListener('wheel', (e)=>{
  if(scrollConsumed) return;
  scrollConsumed = true;
  startFlight();
}, { passive:true });

const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05); // clamp to prevent huge jumps from throttled/backgrounded tabs

  if(!flightActive){
    earth.rotation.y += IDLE_ROT_SPEED * dt;
    clouds.rotation.y = earth.rotation.y * 1.15;
  }

  if(flightActive && flightT < 1){
    flightT = Math.min(1, flightT + dt / FLIGHT_DURATION);
    const rotT = Math.min(1, flightT / 0.55);
    const zoomT = flightT < 0.35 ? 0 : (flightT - 0.35) / 0.65;

    const easedRot = easeInOutCubic(Math.min(1, rotT));
    const q = new THREE.Quaternion().slerpQuaternions(flightStartQuat, targetQuat, easedRot);
    earth.quaternion.copy(q);
    clouds.quaternion.copy(q);

    const easedZoom = easeInCubic(Math.min(1, zoomT));
    const camZ = START_CAM_Z - (START_CAM_Z-END_CAM_Z) * easedZoom;
    camera.position.set(0,0,camZ);
    camera.lookAt(0,0,0);

    const fadeT = Math.max(0, (flightT - 0.7) / 0.3);
    cloudMat.opacity = 0.55 * (1-fadeT);
    atmosMat.opacity = 1 * (1-fadeT);

    // Tonal wash blooms in earlier and lingers through the cut, unifying Earth's
    // saturated colors with the map's warm cream palette before the crossfade lands
    const washT = Math.max(0, Math.min(1, (flightT - 0.68) / 0.27));
    document.getElementById('wash').style.opacity = String(washT * 0.9);

    if(flightT > 0.82){
      const crossT = (flightT - 0.82) / 0.18;
      canvasEl.style.opacity = String(1 - crossT);
      document.getElementById('map').style.opacity = String(crossT);
    }
    if(flightT >= 1){
      // Wash fades out once the map is fully present, revealing full map color
      const settleT = Math.min(1, (flightT - 1) / 0.001 + 1); // instant clamp helper unused
    }

    if(flightT >= 1){
      canvasEl.style.pointerEvents = 'none';
      const wash = document.getElementById('wash');
      wash.style.transition = 'opacity 1.1s ease';
      wash.style.opacity = '0';
      if(leafletMap){
        leafletMap.dragging.enable();
        leafletMap.scrollWheelZoom.enable();
        L.control.zoom({position:'topleft'}).addTo(leafletMap);
      }
    }
  } else if(!flightActive) {
    targetRotX += (mouseY*0.15 - targetRotX) * 0.03;
    targetRotY += (mouseX*0.15 - targetRotY) * 0.03;
    camera.position.x = Math.sin(targetRotY) * 6;
    camera.position.y = targetRotX * 2;
    camera.position.z = Math.cos(targetRotY) * 6;
    camera.lookAt(0,0,0);
  }

  stars.rotation.y += 0.0003 * dt * 60;
  renderer.render(scene, camera);
}

function onAllLoaded(){
  animate();
}

window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if(leafletMap) leafletMap.invalidateSize();
});

window.__startFlight = startFlight;
window.__getFlightT = () => flightT;
</script>
</body>
</html>
